name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build plugin ZIP
        run: |
          cd abri-cerisier-fiche-technique
          zip -r ../abri-cerisier-fiche-technique-${{ github.ref_name }}.zip . \
            -x "*.DS_Store" \
            -x "*/.git/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} – Fiche Technique"
          body: |
            ## Mise à jour automatique via GitHub Actions

            **Version :** `${{ steps.version.outputs.VERSION }}`

            ### Installation / Mise à jour
            - WordPress détecte automatiquement cette mise à jour dans **Extensions → Mises à jour**
            - Ou téléchargez le ZIP ci-dessous et installez manuellement

            ---
            *Plugin Fiche Technique – Abri Cerisier / Abri Français*
          files: abri-cerisier-fiche-technique-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
