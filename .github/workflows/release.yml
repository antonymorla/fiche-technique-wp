name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build plugin ZIP
        run: |
          # ZIP avec le dossier abri-cerisier-fiche-technique/ à la racine
          # IMPORTANT : le nom du dossier doit être IDENTIQUE à chaque version
          # sinon WordPress crée un nouveau dossier et perd la référence au plugin
          zip -r abri-cerisier-fiche-technique.zip abri-cerisier-fiche-technique/ \
            -x "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} – Fiche Technique"
          body: |
            ## Fiche Technique – ${{ github.ref_name }}

            **Version :** `${{ steps.version.outputs.VERSION }}`

            WordPress détecte automatiquement cette mise à jour dans **Extensions → Mises à jour**.
          files: abri-cerisier-fiche-technique.zip
          draft: false
          prerelease: false
